name: Deploy AI Analyzer Dashboard
# Rev: multi-ticker (000660 + NVDA/GOOGL/VRT) 2026-07-03

on:
  push:
    branches: [main, master]
    paths:
      - 'output/dashboard.html'
      - 'output/final_results.json'
      - 'output/indicator_ranking.csv'
      - 'output/market_signals.csv'
      - 'output/consensus_snapshot/**/*.json'
      - 'output/consensus_snapshot/**/*.md'
      - 'output/consensus_snapshot/**/dates.json'
      - 'scripts/generate_snapshot_index.py'
      - 'index.html'
      - '.github/workflows/deploy-dashboard.yml'
  workflow_dispatch:
  schedule:
    - cron: '10 0 * * *'  # 매일 09:10 KST (00:10 UTC)

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate credential environment
        env:
          FRED_API_KEY:          ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          KRX_ID:                ${{ secrets.KRX_ID }}
          KRX_PW:                ${{ secrets.KRX_PW }}
          ECOS_API_KEY:          ${{ secrets.ECOS_API_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          CUSTOMS_API_KEY:       ${{ secrets.CUSTOMS_API_KEY }}
        run: python -X utf8 scripts/audit_env_secrets.py --ci

      - name: Run pipeline
        env:
          FRED_API_KEY:          ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          KRX_ID:                ${{ secrets.KRX_ID }}
          KRX_PW:                ${{ secrets.KRX_PW }}
          ECOS_API_KEY:          ${{ secrets.ECOS_API_KEY }}
          ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
          CUSTOMS_API_KEY:       ${{ secrets.CUSTOMS_API_KEY }}
        run: |
          python -X utf8 agents/run_data_agent_v2.py
          python -X utf8 agents/run_analysis_agent_v2.py
          python -X utf8 agents/run_stock_agent_v2.py
          python -X utf8 agents/run_evaluator_agent_v2.py
          python -X utf8 agents/run_news_agent.py
          python -X utf8 agents/run_decision_agent.py
          python -X utf8 agents/run_ui_agent.py
          python -X utf8 agents/generate_report_v2.py

      - name: Commit updated outputs
        run: |
          git config user.name "AI Analyzer Bot"
          git config user.email "bot@ai-analyzer"
          git add output/ feature_list.json claude-progress.txt
          git diff --staged --quiet || git commit -m "chore: daily pipeline run $(date +'%Y-%m-%d')"
          git pull --rebase origin HEAD || true
          git push origin HEAD

      - name: Notify via ntfy
        if: always()
        run: |
          curl -s \
            -H "Title: AI Analyzer Pipeline ${{ job.status }}" \
            -H "Tags: chart_with_upwards_trend" \
            -d "Weekly pipeline ${{ job.status }} at $(date +'%Y-%m-%d %H:%M UTC'). Dashboard: https://${{ github.repository_owner }}.github.io/AI-Analyzer/" \
            https://ntfy.sh/ai-analyzer-${{ github.repository_owner }}

  deploy:
    runs-on: ubuntu-latest
    needs: run-pipeline
    # run-pipeline is skipped on push → this job still runs (if: always())
    if: always()
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp output/dashboard.html _site/index.html
          cp index.html _site/redirect.html 2>/dev/null || true
          cp output/indicator_ranking.csv _site/ 2>/dev/null || true
          cp output/market_signals.csv    _site/ 2>/dev/null || true
          cp output/stock_analysis.csv    _site/ 2>/dev/null || true
          cp output/final_results.json    _site/ 2>/dev/null || true
          # Phase 14-0-C: consensus tracker data (JSON + Markdown only, no raw HTML)
          mkdir -p _site/consensus_snapshot
          # Flat-file outputs (Phase 14-0-B2 ~ 14-4)
          cp output/consensus_snapshot/*.json _site/consensus_snapshot/ 2>/dev/null || true
          cp output/consensus_snapshot/*.md   _site/consensus_snapshot/ 2>/dev/null || true
          # Immutable snapshot history (Phase 14-0-C) — JSON + MD only, no raw HTML fixtures
          if [ -d output/consensus_snapshot/history ]; then
            find output/consensus_snapshot/history \( -name '*.json' -o -name '*.md' \) \
              -exec sh -c 'rel="${1#output/consensus_snapshot/}"; mkdir -p "_site/consensus_snapshot/$(dirname "$rel")"; cp "$1" "_site/consensus_snapshot/$rel"' _ {} \;
          fi
          # Regenerate dates index (in case fresh snapshots landed between commit and deploy)
          python scripts/generate_snapshot_index.py --history-root _site/consensus_snapshot/history 2>/dev/null || true

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
