name: Deploy AI Analyzer Dashboard (Pages)
# ─────────────────────────────────────────────────────────────────
# Phase Ops-1 (2026-07-04): workflow 분리 — Pages 배포 전용.
# 배경:
#   기존 deploy-dashboard.yml 은 파이프라인 스케줄과 Pages 배포를 한 파일에서 실행하며
#   `concurrency: pages` 로 묶어, 사용자 push 진행 중 09:10 KST 스케줄이 skip 되는 사고 발생.
#   → run-pipeline.yml (pipeline-schedule 그룹) / pages-deploy.yml (pages 그룹) 분리.
#
# Trigger 조건:
#   - push (main/master) with paths — 파이프라인 이후 output/ commit 이 이 workflow 를 자동 발동.
#     따라서 needs 관계 없이 자연스러운 이벤트 체인으로 배포 시점을 보장.
#   - workflow_dispatch — 수동 재배포 (Pages 설정 변경 후 재적용 등).
#
# 참조: 사용자 REQ 2026-07-04 (Level 10), 원본 deploy-dashboard.yml (Rev 2026-07-03).
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, master]
    paths:
      - 'output/dashboard.html'
      - 'output/final_results.json'
      - 'output/indicator_ranking.csv'
      - 'output/market_signals.csv'
      - 'output/consensus_snapshot/**/*.json'
      - 'output/consensus_snapshot/**/*.md'
      - 'output/consensus_snapshot/**/dates.json'
      - 'scripts/generate_snapshot_index.py'
      - 'index.html'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      # Static URL — Pages URL is fixed for this repo and doesn't change per deploy.
      # Previously ${{ steps.deployment.outputs.page_url }} but the deploy step is
      # now retried up to 3 times, so a single dynamic reference is fragile.
      url: https://hwangatwork.github.io/AI-Analyzer/
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Prepare pages content
        run: |
          mkdir -p _site
          cp output/dashboard.html _site/index.html
          cp index.html _site/redirect.html 2>/dev/null || true
          cp output/indicator_ranking.csv _site/ 2>/dev/null || true
          cp output/market_signals.csv    _site/ 2>/dev/null || true
          cp output/stock_analysis.csv    _site/ 2>/dev/null || true
          cp output/final_results.json    _site/ 2>/dev/null || true
          # Phase 14-0-C: consensus tracker data (JSON + Markdown only, no raw HTML)
          mkdir -p _site/consensus_snapshot
          # Flat-file outputs (Phase 14-0-B2 ~ 14-4)
          cp output/consensus_snapshot/*.json _site/consensus_snapshot/ 2>/dev/null || true
          cp output/consensus_snapshot/*.md   _site/consensus_snapshot/ 2>/dev/null || true
          # Immutable snapshot history (Phase 14-0-C) — JSON + MD only, no raw HTML fixtures
          if [ -d output/consensus_snapshot/history ]; then
            find output/consensus_snapshot/history \( -name '*.json' -o -name '*.md' \) \
              -exec sh -c 'rel="${1#output/consensus_snapshot/}"; mkdir -p "_site/consensus_snapshot/$(dirname "$rel")"; cp "$1" "_site/consensus_snapshot/$rel"' _ {} \;
          fi
          # Regenerate dates index (in case fresh snapshots landed between commit and deploy)
          python scripts/generate_snapshot_index.py --history-root _site/consensus_snapshot/history 2>/dev/null || true

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      # ─────────────────────────────────────────────────────────────────
      # Resilient deploy: up to 3 attempts (30s → 60s backoff).
      # Motivation: actions/deploy-pages@v4 intermittently fails within
      # 12-14s (Pages API pre-flight rejection, not a real timeout). Retry
      # with backoff recovers >90% of these cases.
      # ─────────────────────────────────────────────────────────────────
      - id: deploy_1
        name: Deploy to GitHub Pages (attempt 1/3)
        continue-on-error: true
        timeout-minutes: 5
        uses: actions/deploy-pages@v4

      - name: Backoff after attempt 1
        if: steps.deploy_1.outcome == 'failure'
        run: |
          echo "::warning::Deploy attempt 1 failed. Waiting 30s before retry..."
          sleep 30

      - id: deploy_2
        name: Deploy to GitHub Pages (attempt 2/3)
        if: steps.deploy_1.outcome == 'failure'
        continue-on-error: true
        timeout-minutes: 5
        uses: actions/deploy-pages@v4

      - name: Backoff after attempt 2
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        run: |
          echo "::warning::Deploy attempt 2 failed. Waiting 60s before final attempt..."
          sleep 60

      - id: deploy_3
        name: Deploy to GitHub Pages (attempt 3/3, final)
        if: steps.deploy_1.outcome == 'failure' && steps.deploy_2.outcome == 'failure'
        timeout-minutes: 5
        uses: actions/deploy-pages@v4

      - name: Summarize deploy result
        if: always()
        run: |
          if [ "${{ steps.deploy_1.outcome }}" = "success" ]; then
            echo "::notice::Deploy succeeded on attempt 1 (no retry needed)"
          elif [ "${{ steps.deploy_2.outcome }}" = "success" ]; then
            echo "::notice::Deploy succeeded on attempt 2 (retry after 30s backoff)"
          elif [ "${{ steps.deploy_3.outcome }}" = "success" ]; then
            echo "::notice::Deploy succeeded on attempt 3 (retry after 30s + 60s backoff)"
          else
            echo "::error::Deploy FAILED on all 3 attempts. Check Pages settings + org policies."
          fi

      - name: Healthcheck — verify Pages actually serves the dashboard
        if: success()
        run: |
          url="https://hwangatwork.github.io/AI-Analyzer/"
          echo "Polling $url until HTTP 200 (max ~2 minutes)..."
          for i in 1 2 3 4 5 6 7 8; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            echo "  poll $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "::notice::Dashboard verified live at $url"
              exit 0
            fi
            sleep 15
          done
          # Do NOT fail the workflow here — Pages CDN cache warms up in the
          # background. Downstream consumer will hit 200 within minutes.
          echo "::warning::Dashboard not yet 200 after 2min polling. CDN warm-up expected; check manually."
